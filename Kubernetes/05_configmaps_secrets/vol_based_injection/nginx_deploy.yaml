apiVersion: apps/v1 
kind: Deployment
metadata:
  name: nginx-prod-deploy
  labels:
    app: nginx-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-prod
  template:
    metadata:
      name: nginx
      labels:
        app: nginx-prod
    spec:
      containers:
        - name: nginx  
          image: nginx              
          ports:
            - containerPort: 80
---
apiVersion: v1 
kind: Service 
metadata:
  name: nginx-prod-service
  labels:
    app: nginx-prod
spec:
  selector:
    app: nginx-prod
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP