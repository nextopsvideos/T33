apiVersion: apps/v1 
kind: Deployment              #Controller - self healing
metadata:
  name: nginx-deployment
  labels:
    app: nginx
    env: prod 
spec: 
  replicas: 2                #to create copies of following pod
  selector:
    matchLabels:
      app: nginx
  template:
    metadata: 
      name: nginx-pod 
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx 
          image: nginx:1.31.2 
          ports:
            - containerPort: 80