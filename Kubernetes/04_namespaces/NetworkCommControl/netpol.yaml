apiVersion: networking.k8s.io/v1 
kind: NetworkPolicy
metadata:
  name: deny-cross-ns-comms 
  namespace: dev-team 
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress               # incoming
  ingress:
  - from: 
    - namespaceSelector:
        matchLabels:
          name: default